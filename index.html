<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Love Countdown · Instant Share</title>
  <style>
    body { background: #0a0a2a; color: white; font-family: system-ui; padding: 20px; }
    .card { background: rgba(15,25,45,0.8); border-radius: 32px; padding: 24px; max-width: 500px; margin: auto; border: 1px solid cyan; }
    input, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 60px; border: none; }
    button { background: linear-gradient(90deg,#8a2be2,#00c6ff); font-weight: bold; color: white; }
    .count { font-size: 3rem; font-weight: bold; color: cyan; }
  </style>
</head>
<body>
<div id="gen" class="card">
  <h2>✨ RELATIONSHIP COUNTDOWN ✨</h2>
  <input id="yourName" placeholder="Your name">
  <input id="partnerName" placeholder="Partner's name">
  <input id="startDate" type="date">
  <input id="msg" placeholder="Custom message (optional)">
  <button id="generateBtn">💾 GENERATE & GET LINK</button>
</div>
<div id="view" class="card" style="display:none">
  <div id="viewContent"></div>
  <button id="copyLink">🔗 Copy Shareable Link</button>
  <button id="newBtn">✨ Create New</button>
</div>
<script>
  document.getElementById('generateBtn').onclick = () => {
    const yourName = document.getElementById('yourName').value.trim();
    const partnerName = document.getElementById('partnerName').value.trim();
    const startDate = document.getElementById('startDate').value;
    const msg = document.getElementById('msg').value;
    if (!yourName || !partnerName || !startDate) { alert("Please fill names and date"); return; }
    const data = { yourName, partnerName, startDate, msg };
    const json = JSON.stringify(data);
    const encoded = btoa(encodeURIComponent(json));
    const url = window.location.origin + window.location.pathname + '?data=' + encoded;
    window.history.pushState({}, '', url);
    loadFromURL();
  };
  function loadFromURL() {
    const params = new URLSearchParams(window.location.search);
    const enc = params.get('data');
    if (enc) {
      const json = decodeURIComponent(atob(enc));
      const data = JSON.parse(json);
      const days = Math.floor((new Date() - new Date(data.startDate)) / (1000*60*60*24));
      document.getElementById('gen').style.display = 'none';
      document.getElementById('view').style.display = 'block';
      document.getElementById('viewContent').innerHTML = `
        <h2>❤️ ${escapeHtml(data.yourName)} & ${escapeHtml(data.partnerName)}</h2>
        <p>Together since ${data.startDate}</p>
        <div class="count">${days >= 0 ? days : 0} days together</div>
        <p>${escapeHtml(data.msg) || ''}</p>
      `;
    } else {
      document.getElementById('gen').style.display = 'block';
      document.getElementById('view').style.display = 'none';
    }
  }
  function escapeHtml(str) { return String(str).replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
  document.getElementById('copyLink')?.addEventListener('click', () => {
    navigator.clipboard.writeText(window.location.href);
    alert("✅ Link copied! Share with anyone.");
  });
  document.getElementById('newBtn')?.addEventListener('click', () => {
    window.location.href = window.location.pathname;
  });
  loadFromURL();
</script>
</body>
</html>
