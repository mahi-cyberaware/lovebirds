<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>💞 Eternal Bond · Romantic Countdown 💞</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;600;700;800&family=Dancing+Script:wght@400;700&family=Great+Vibes&family=Poppins:wght@300;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: radial-gradient(circle at 30% 20%, #0b0b2b, #000000);
      min-height: 100vh;
      color: white;
      padding: 16px;
    }
    .dynamic-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 50% 50%, rgba(255,80,120,0.2), rgba(0,0,0,0.85));
      z-index: -2;
      animation: breathe 7s infinite alternate;
    }
    @keyframes breathe { 0% { opacity: 0.4; } 100% { opacity: 0.8; } }
    canvas#floating-hearts {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: -1;
    }
    .glass-card {
      background: rgba(20, 30, 55, 0.6);
      backdrop-filter: blur(16px);
      border-radius: 2rem;
      border: 1px solid rgba(255,100,150,0.5);
      box-shadow: 0 20px 40px rgba(0,0,0,0.4), 0 0 20px rgba(255,80,120,0.3);
      transition: 0.3s;
      padding: 1.8rem;
    }
    .neon-btn {
      background: linear-gradient(95deg, #ff4d6d, #c9184a);
      border: none;
      padding: 12px 24px;
      font-weight: bold;
      border-radius: 60px;
      color: white;
      cursor: pointer;
      box-shadow: 0 0 12px #ff4d6d;
      transition: 0.2s;
      width: 100%;
    }
    .neon-btn:hover { transform: scale(1.02); box-shadow: 0 0 26px #ff4d6d; }
    input, select, textarea {
      width: 100%;
      padding: 14px;
      margin: 8px 0;
      background: rgba(0,0,0,0.6);
      border: 1px solid #ff99cc;
      border-radius: 60px;
      color: white;
      font-size: 1rem;
    }
    input[type="date"] { padding: 12px; font-size: 1.1rem; }
    label { font-weight: 600; font-size: 0.85rem; color: #ffccdd; display: block; margin-top: 12px; }
    .dual-image {
      display: flex;
      gap: 20px;
      justify-content: center;
      flex-wrap: wrap;
      margin: 15px 0;
    }
    .img-preview {
      text-align: center;
      width: 110px;
    }
    .img-preview img {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid #ff66cc;
      box-shadow: 0 0 12px magenta;
    }
    .font-selector {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin: 8px 0;
    }
    .font-btn {
      background: #222;
      padding: 6px 12px;
      border-radius: 60px;
      cursor: pointer;
      font-size: 0.8rem;
      border: 1px solid cyan;
    }
    .count-number { font-size: 2.8rem; font-weight: 800; background: linear-gradient(135deg,#fff,#ff99cc); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .quote-card {
      background: rgba(0,0,0,0.5);
      border-radius: 50px;
      padding: 18px;
      margin: 20px 0;
      text-align: center;
      cursor: pointer;
      transition: 0.2s;
      border-left: 5px solid #ff66cc;
      animation: fadeIn 0.6s;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    .popup-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.9);
      backdrop-filter: blur(20px);
      z-index: 2000;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      animation: zoomPop 0.3s ease;
    }
    @keyframes zoomPop { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .popup-quote {
      font-size: 2rem;
      text-align: center;
      max-width: 85%;
      background: rgba(0,0,0,0.7);
      padding: 30px;
      border-radius: 60px;
      font-family: 'Dancing Script', cursive;
      border: 2px solid white;
    }
    footer { font-size: 0.7rem; text-align: center; margin-top: 20px; opacity: 0.5; }
    @media (max-width: 650px) { .count-number { font-size: 2rem; } .glass-card { padding: 1.2rem; } }
  </style>
</head>
<body>
<div class="dynamic-bg"></div>
<canvas id="floating-hearts"></canvas>

<!-- GENERATOR SECTION -->
<div id="generatorSection" class="glass-card" style="max-width: 650px; margin: 20px auto;">
  <div style="text-align:center;">
    <i class="fas fa-heart heart-beat" style="font-size: 2.2rem; color: #ff66cc;"></i>
    <h1 style="font-size: 1.8rem;">✨ RELATIONSHIP COUNTDOWN ✨</h1>
    <p>Create your magical, shareable love page</p>
  </div>
  <div id="genError" style="color:#ffaaaa; background:#ff000033; border-radius: 30px; padding: 8px; margin: 10px 0; display:none;"></div>
  
  <label>💑 Relationship Type</label>
  <select id="relType">
    <option value="Girlfriend">💖 Girlfriend</option>
    <option value="Wife">💍 Wife</option>
    <option value="Best Friend">🌟 Best Friend</option>
    <option value="Soulmate">🌌 Soulmate</option>
  </select>
  
  <div class="dual-image">
    <div class="img-preview"><label>📸 Your Photo</label><input type="file" id="myPhoto" accept="image/*"><div id="myPreview"></div></div>
    <div class="img-preview"><label>📸 Partner's Photo</label><input type="file" id="partnerPhoto" accept="image/*"><div id="partnerPreview"></div></div>
  </div>
  
  <label>💕 Your Name</label><input id="yourName" placeholder="e.g., Mahi">
  <label>💕 Partner's Name</label><input id="partnerName" placeholder="e.g., Priya">
  
  <label>✍️ Font Style for Names</label>
  <div class="font-selector">
    <span class="font-btn" data-font="'Inter', sans-serif">Modern</span>
    <span class="font-btn" data-font="'Dancing Script', cursive">Romantic</span>
    <span class="font-btn" data-font="'Great Vibes', cursive">Elegant</span>
    <span class="font-btn" data-font="'Poppins', sans-serif">Soft</span>
  </div>
  
  <label>📅 Anniversary / Start Date (larger picker)</label>
  <input id="startDate" type="date" style="font-size: 1.2rem; padding: 14px;">
  
  <label>💬 Custom Romantic Message</label><input id="customMsg" placeholder="You are my everything...">
  <label>📝 Emotional Note</label><textarea id="emotionalNote" rows="2" placeholder="A personal letter to my love..."></textarea>
  
  <button id="generateBtn" class="neon-btn"><i class="fas fa-meteor"></i> GENERATE & GET SHAREABLE LINK</button>
</div>

<!-- COUNTDOWN VIEWER -->
<div id="countdownSection" class="glass-card" style="max-width: 750px; margin: 20px auto; display: none;">
  <div id="countdownContent"></div>
  <div style="display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; margin-top: 24px;">
    <button id="copyLinkBtn" class="neon-btn" style="background: linear-gradient(90deg,#2b6f8a,#00b4d8);"><i class="fas fa-link"></i> Copy Link</button>
    <button id="shareBtn" class="neon-btn"><i class="fas fa-share-alt"></i> Share</button>
    <button id="screenshotBtn" class="neon-btn"><i class="fas fa-camera"></i> Screenshot</button>
    <button id="musicBtn" class="neon-btn"><i class="fas fa-music"></i> Ambience</button>
    <button id="newStoryBtn" class="neon-btn"><i class="fas fa-heart-broken"></i> New Story</button>
  </div>
  <footer>✨ Click any quote to see a magical animation ✨</footer>
</div>

<script>
  // ================== RELATIONSHIP BASED QUOTES ==================
  const quoteDB = {
    Girlfriend: ["Every day with you feels like a fairytale. 💖", "You make my heart skip a beat, girlfriend. 💓", "Falling for you more each sunrise. 🌅", "Your smile is my favorite view. 😊", "Being yours is the best thing that happened to me. 🥰"],
    Wife: ["My wife, my queen, my forever. 👑", "Every moment with you is a blessing. 💍", "You are my home, my everything. 🏡", "I'd choose you again in every lifetime. ♾️", "Your love makes life complete. ❤️"],
    "Best Friend": ["You are my rock, my best friend for life. 🤝", "Life is better with you by my side. 🌟", "Through thick and thin, you're my person. 💕", "Laughing with you is my therapy. 😂", "Best friends who are soulmates. ✨"],
    Soulmate: ["We found each other in a chaotic world. 🌍", "Soulmates are not found, they recognize. 🔥", "Our souls dance together. 💃🕺", "You complete me in ways words cannot. 🌙", "From the first hello, I knew. 💫"]
  };
  
  function getRandomQuote(relType) {
    const arr = quoteDB[relType] || quoteDB.Girlfriend;
    return arr[Math.floor(Math.random() * arr.length)];
  }
  
  // Helper: encode data to URL
  function encodeData(obj) { return btoa(encodeURIComponent(JSON.stringify(obj))); }
  function decodeData(str) { try { return JSON.parse(decodeURIComponent(atob(str))); } catch(e) { return null; } }
  
  // Compress image to base64 (max width 300)
  function compressImage(file) {
    return new Promise((resolve) => {
      if (!file) return resolve(null);
      const reader = new FileReader();
      reader.readAsDataURL(file);
      reader.onload = (e) => {
        const img = new Image();
        img.src = e.target.result;
        img.onload = () => {
          const canvas = document.createElement('canvas');
          let w = img.width, h = img.height;
          const maxW = 300;
          if (w > maxW) { h = (h * maxW) / w; w = maxW; }
          canvas.width = w; canvas.height = h;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, w, h);
          resolve(canvas.toDataURL('image/jpeg', 0.7));
        };
        img.onerror = () => resolve(null);
      };
      reader.onerror = () => resolve(null);
    });
  }
  
  // days calculation
  function computeDays(startStr) {
    const start = new Date(startStr);
    const now = new Date();
    const diffDays = Math.floor((now - start) / (86400000));
    let nextAnniv = new Date(now.getFullYear(), start.getMonth(), start.getDate());
    if (nextAnniv < now) nextAnniv.setFullYear(now.getFullYear()+1);
    const daysUntil = Math.ceil((nextAnniv - now) / 86400000);
    return { daysTogether: diffDays >=0 ? diffDays : 0, daysUntilAnniv: daysUntil };
  }
  
  // Show quote popup with animation & color burst
  function showQuotePopup(quote, color) {
    const overlay = document.createElement('div');
    overlay.className = 'popup-overlay';
    overlay.style.background = `radial-gradient(circle, ${color}20, #000000dd)`;
    overlay.innerHTML = `<div class="popup-quote" style="color:${color}; text-shadow: 0 0 15px ${color};">✨ ${quote} ✨</div>`;
    document.body.appendChild(overlay);
    // floating particles inside popup
    for (let i=0;i<50;i++) {
      const particle = document.createElement('div');
      particle.innerHTML = ['❤️','💖','✨','💫','🌸','💕'][Math.floor(Math.random()*6)];
      particle.style.position = 'absolute';
      particle.style.left = Math.random()*100 + '%';
      particle.style.top = '50%';
      particle.style.fontSize = (Math.random()*30+15)+'px';
      particle.style.opacity = Math.random();
      particle.style.animation = `floatUp ${Math.random()*2+1}s ease-out forwards`;
      overlay.appendChild(particle);
    }
    overlay.onclick = () => overlay.remove();
    const style = document.createElement('style');
    style.textContent = `@keyframes floatUp { 0% { transform: translateY(0) rotate(0deg); opacity:1; } 100% { transform: translateY(-200px) rotate(360deg); opacity:0; } }`;
    document.head.appendChild(style);
  }
  
  // Render countdown page (viewer)
  function renderCountdown(data) {
    const { yourName, partnerName, startDate, customMsg, emotionalNote, myPhoto, partnerPhoto, relType, nameFont } = data;
    const { daysTogether, daysUntilAnniv } = computeDays(startDate);
    const formattedStart = new Date(startDate).toLocaleDateString('en-US', { year:'numeric', month:'long', day:'numeric' });
    const randomQuote = getRandomQuote(relType);
    const randomColor = `hsl(${Math.random()*60 + 300}, 80%, 65%)`;
    const imageHtml = `
      <div class="dual-image">
        ${myPhoto ? `<div class="img-preview"><img src="${myPhoto}"><br>❤️ ${escapeHtml(yourName)}</div>` : `<div class="img-preview"><i class="fas fa-user-circle" style="font-size:70px;"></i><br>${escapeHtml(yourName)}</div>`}
        ${partnerPhoto ? `<div class="img-preview"><img src="${partnerPhoto}"><br>💖 ${escapeHtml(partnerName)}</div>` : `<div class="img-preview"><i class="fas fa-user-circle" style="font-size:70px;"></i><br>${escapeHtml(partnerName)}</div>`}
      </div>
    `;
    const fontFamily = nameFont || "'Inter', sans-serif";
    document.getElementById('countdownContent').innerHTML = `
      ${imageHtml}
      <h2 style="font-family:${fontFamily}; font-size:2rem; text-align:center;"><span class="heart-beat">❤️</span> ${escapeHtml(yourName)} & ${escapeHtml(partnerName)} <span class="heart-beat">❤️</span></h2>
      <p style="text-align:center;"><i class="fas fa-calendar-alt"></i> Together since ${formattedStart}  |  ${relType}</p>
      <div style="background:#00000055; border-radius: 50px; padding: 18px; margin: 20px 0; text-align:center;">
        <div class="count-number">${daysTogether} days together</div>
        <div>✨ Next anniversary in ${daysUntilAnniv} days ✨</div>
      </div>
      <div class="quote-card" id="dynamicQuoteCard" style="border-left-color: ${randomColor}; color:${randomColor};">
        <i class="fas fa-quote-left"></i> ${randomQuote} <i class="fas fa-quote-right"></i>
        <div><small style="opacity:0.7;">✨ click me for magic ✨</small></div>
      </div>
      ${customMsg ? `<div style="background:#ff66cc20; border-radius: 30px; padding:12px; margin:12px 0;">✨ “${escapeHtml(customMsg)}” ✨</div>` : ''}
      ${emotionalNote ? `<div style="border-left: 3px solid #ff66cc; padding-left: 16px; margin:12px 0;"><i class="fas fa-feather"></i> ${escapeHtml(emotionalNote)}</div>` : ''}
    `;
    // Attach quote click event with random color & popup
    const quoteDiv = document.getElementById('dynamicQuoteCard');
    if (quoteDiv) {
      const currentQuote = randomQuote;
      quoteDiv.onclick = () => {
        const newColor = `hsl(${Math.random()*360}, 80%, 65%)`;
        quoteDiv.style.borderLeftColor = newColor;
        quoteDiv.style.color = newColor;
        showQuotePopup(currentQuote, newColor);
      };
    }
  }
  
  function escapeHtml(str) { return String(str).replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); }
  
  // Generate event
  document.getElementById('generateBtn').onclick = async () => {
    const yourName = document.getElementById('yourName').value.trim();
    const partnerName = document.getElementById('partnerName').value.trim();
    const startDate = document.getElementById('startDate').value;
    const customMsg = document.getElementById('customMsg').value;
    const emotionalNote = document.getElementById('emotionalNote').value;
    const relType = document.getElementById('relType').value;
    const myPhotoFile = document.getElementById('myPhoto').files[0];
    const partnerPhotoFile = document.getElementById('partnerPhoto').files[0];
    const nameFont = document.querySelector('.font-btn.active')?.getAttribute('data-font') || "'Inter', sans-serif";
    
    if (!yourName || !partnerName || !startDate) {
      const err = document.getElementById('genError');
      err.innerText = "💔 Please fill names and anniversary date.";
      err.style.display = 'block';
      setTimeout(() => err.style.display = 'none', 3000);
      return;
    }
    let myPhotoB64 = null, partnerPhotoB64 = null;
    if (myPhotoFile) myPhotoB64 = await compressImage(myPhotoFile);
    if (partnerPhotoFile) partnerPhotoB64 = await compressImage(partnerPhotoFile);
    
    const loveData = { yourName, partnerName, startDate, customMsg, emotionalNote, relType, myPhoto: myPhotoB64, partnerPhoto: partnerPhotoB64, nameFont };
    const encoded = encodeData(loveData);
    const newUrl = window.location.origin + window.location.pathname + '?love=' + encoded;
    window.history.pushState({}, '', newUrl);
    loadFromUrl();
  };
  
  function loadFromUrl() {
    const params = new URLSearchParams(window.location.search);
    const enc = params.get('love');
    if (enc) {
      const data = decodeData(enc);
      if (data && data.yourName && data.partnerName && data.startDate) {
        document.getElementById('generatorSection').style.display = 'none';
        document.getElementById('countdownSection').style.display = 'block';
        renderCountdown(data);
        currentData = data;
        return;
      }
    }
    document.getElementById('generatorSection').style.display = 'block';
    document.getElementById('countdownSection').style.display = 'none';
  }
  
  let currentData = null;
  document.getElementById('copyLinkBtn')?.addEventListener('click', () => {
    navigator.clipboard.writeText(window.location.href);
    alert("✅ Love link copied! Share it anywhere.");
  });
  document.getElementById('shareBtn')?.addEventListener('click', () => {
    if (navigator.share) navigator.share({ title: 'Our Eternal Bond', url: window.location.href });
    else alert("Use copy link button");
  });
  document.getElementById('screenshotBtn')?.addEventListener('click', () => {
    const el = document.getElementById('countdownSection');
    html2canvas(el, { scale: 2 }).then(canvas => {
      const link = document.createElement('a');
      link.download = 'romantic_countdown.png';
      link.href = canvas.toDataURL();
      link.click();
    });
  });
  document.getElementById('newStoryBtn')?.addEventListener('click', () => {
    window.location.href = window.location.pathname;
  });
  
  // Font selector active
  const fontBtns = document.querySelectorAll('.font-btn');
  fontBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      fontBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    });
  });
  // Set default active font
  document.querySelector('.font-btn')?.classList.add('active');
  
  // Image previews
  document.getElementById('myPhoto').addEventListener('change', e => {
    const file = e.target.files[0];
    if (file) {
      const reader = new FileReader();
      reader.onload = ev => document.getElementById('myPreview').innerHTML = `<img src="${ev.target.result}" style="width:80px; height:80px; border-radius:50%; border:2px solid cyan;">`;
      reader.readAsDataURL(file);
    } else document.getElementById('myPreview').innerHTML = '';
  });
  document.getElementById('partnerPhoto').addEventListener('change', e => {
    const file = e.target.files[0];
    if (file) {
      const reader = new FileReader();
      reader.onload = ev => document.getElementById('partnerPreview').innerHTML = `<img src="${ev.target.result}" style="width:80px; height:80px; border-radius:50%; border:2px solid magenta;">`;
      reader.readAsDataURL(file);
    } else document.getElementById('partnerPreview').innerHTML = '';
  });
  
  // Floating hearts animation
  const canvas = document.getElementById('floating-hearts');
  let ctx = canvas.getContext('2d');
  let hearts = [];
  function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
  window.addEventListener('resize', resizeCanvas);
  resizeCanvas();
  for (let i=0;i<50;i++) {
    hearts.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, size: Math.random()*18+10, speedY: Math.random()*0.8+0.4, opacity: Math.random()*0.6+0.2 });
  }
  function drawHearts() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    for (let h of hearts) {
      ctx.font = `${h.size}px "Font Awesome 6 Free"`;
      ctx.fillStyle = `rgba(255, 100, 150, ${h.opacity})`;
      ctx.fillText("❤️", h.x, h.y);
      h.y -= h.speedY;
      if (h.y < -30) { h.y = canvas.height+30; h.x = Math.random()*canvas.width; }
    }
    requestAnimationFrame(drawHearts);
  }
  drawHearts();
  
  // Ambient music (simple)
  let audioCtx = null, musicOn = false, gainNode = null;
  async function startMusic() {
    if (audioCtx) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    gainNode = audioCtx.createGain();
    gainNode.gain.value = 0.12;
    gainNode.connect(audioCtx.destination);
    const osc1 = audioCtx.createOscillator();
    const osc2 = audioCtx.createOscillator();
    osc1.type = 'sine'; osc2.type = 'triangle';
    osc1.frequency.value = 261.63; osc2.frequency.value = 329.63;
    osc1.connect(gainNode); osc2.connect(gainNode);
    osc1.start(); osc2.start();
    const lfo = audioCtx.createOscillator();
    const lfoGain = audioCtx.createGain();
    lfo.frequency.value = 0.18;
    lfoGain.gain.value = 6;
    lfo.connect(lfoGain);
    lfoGain.connect(osc1.frequency);
    lfoGain.connect(osc2.frequency);
    lfo.start();
  }
  document.getElementById('musicBtn')?.addEventListener('click', async () => {
    if (!musicOn) {
      await startMusic();
      if (audioCtx) await audioCtx.resume();
      if (gainNode) gainNode.gain.value = 0.12;
      musicOn = true;
      document.getElementById('musicBtn').innerHTML = '<i class="fas fa-music"></i> On';
    } else {
      if (gainNode) gainNode.gain.value = 0;
      musicOn = false;
      document.getElementById('musicBtn').innerHTML = '<i class="fas fa-music"></i> Ambience';
    }
  });
  
  loadFromUrl();
</script>
</body>
