<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>LoveBirds AI</title>

    <link rel="stylesheet" href="style.css">

    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

</head>

<body>

    <!-- Rain Canvas -->
    <canvas id="rain"></canvas>

    <!-- Overlay -->
    <div class="overlay"></div>

    <!-- Background Music -->
    <audio id="bgMusic" autoplay loop>
        <source src="assets/music.mp3" type="audio/mpeg">
    </audio>

    <div class="container">

        <h1 id="title">
            LoveBirds AI
        </h1>

        <div class="story-box">

            <p id="story">
                Loading story...
            </p>

        </div>

        <div class="buttons">

            <button onclick="generateAIStory()">
                OpenAI Story
            </button>

            <button onclick="generateGeminiStory()">
                Gemini Story
            </button>

            <button onclick="generateStory()">
                Random Story
            </button>

            <button onclick="speakStory()">
                Listen
            </button>

            <button onclick="shareStory()">
                Share
            </button>

            <button onclick="generateLoveLetter()">
                Love Letter
            </button>

        </div>

        <div id="qrcode"></div>

        <div class="timeline">

            <div class="event">
                ❤️ First Meet
            </div>

            <div class="event">
                ☎️ First Call
            </div>

            <div class="event">
                💍 Forever Promise
            </div>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
